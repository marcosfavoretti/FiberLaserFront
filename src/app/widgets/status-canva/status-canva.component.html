<div class="sidebar-header">
    <div class="status-indicator">
        <p-overlaybadge [severity]="ws.online ? 'success' : 'danger'" value="">
            <div class="status-icon-wrapper">
                <i class="pi pi-bolt text-white" style="font-size: 1.5rem;"></i>
            </div>
        </p-overlaybadge>
        <div class="status-info">
            <span class="status-label">Status do Serviço</span>
            <span class="status-text" [class]="ws.online ? 'status-online-text' : 'status-offline-text'">
                {{ ws.online ? 'Conectado' : 'Desconectado' }}
            </span>
        </div>
    </div>
</div>
@if (!ws.online) {
    <div class="disconnect-overlay">
        <i class="pi pi-exclamation-triangle disconnect-icon"></i>
        <h2 class="disconnect-title">Serviço fora do ar</h2>
        <p class="text-light mt-2">Aguardando conexão...</p>
    </div>
}
