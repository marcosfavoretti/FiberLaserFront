<p-dialog [header]="this.loadVideo?  'Câmera Arrastável': 'Clique para carregar a câmera'" [(visible)]="display" [modal]="false" [draggable]="true" [resizable]="false"
    [style]="{width: '400px', height: '400px', position: 'fixed', bottom: '0', left: '0'}" [baseZIndex]="10000">
    @defer (when loadVideo) {
        <app-stream-player [videoSrc]="'http://192.168.99.10:8080/mystream.m3u8'" />
    }
    @placeholder {
        <button class="btn btn-group btn-secondary" (click)="runVideo()"><i class="pi pi-camera"></i></button>
    }
</p-dialog>
