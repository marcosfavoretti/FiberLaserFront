<p-dialog
  [header]="loadVideo() ? 'Câmera Arrastável' : 'Clique para carregar a câmera'"
  [(visible)]="display"
  (onHide)="onHide()"
  [modal]="false"
  [draggable]="true"
  [resizable]="true"
  [style]="{width: '500px', height: '400px', position: 'fixed', bottom: '20px', right: '20px', backgroundColor: 'lightgray'}"
  [baseZIndex]="10000">

  @if (loadVideo()) {
    <div class="video-wrapper">
      <app-stream-player [videoSrc]="videoUrl" />
    </div>
  } @else {
    <div class="placeholder-content">
      <button class="load-video-btn" (click)="runVideo()">
        <i class="pi pi-camera"></i>
        <span>Carregar Câmera</span>
      </button>
      <p>Clique no botão acima para iniciar o streaming de vídeo</p>
    </div>
}
</p-dialog>
