<div class="px-2 h-75">
    <div class="d-flex align-items-center gap-2 text-white">
        <i class="pi pi-arrow-circle-right"></i>
        <h2 class="fst-italic">Para Fazer</h2>
    </div>
    @if (production && production.length > 0) {
    <div>
        <queue-list class="h-100" [data]="displayInfo"></queue-list>
    </div>
    }
    @else {
    <div class="bg-white p-2 border-3 d-flex gap-2">
        <span class="text-secondary">|> nada planejado por hora!</span>
    </div>
    }
</div>
