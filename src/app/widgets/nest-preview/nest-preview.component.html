<div [ngClass]="nestCss.get(nest.ModelNest.type)" class="position-relative production-table-default shadow-lg p-3">
    @for (plate of nestPlates(nest); track $index) {
    <plate [ngClass]="
        'position-relative' +
        plate.Done? '': 'gray-mask'" [plate]="plate" />
    }
</div>
