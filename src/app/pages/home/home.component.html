<div class="container-fluid p-0" style="height: 100vh;">
    <p-splitter [panelSizes]="[33, 67]" [style]="{ height: '100vh', border: 'none' }" class="h-100">
        <!-- Sidebar / Painel Esquerdo -->
        <ng-template pTemplate="content">
            <p-splitter-panel class="sidebar" style="display: flex; flex-direction: column;">
                <status-canva style="flex-shrink: 0;"></status-canva>
                <plates-queue style="flex: 1; overflow: hidden;"></plates-queue>
            </p-splitter-panel>
        </ng-template>

        <!-- Main Content / Painel Direito -->
        <ng-template pTemplate="content">
            <p-splitter-panel style="background: #f3f4f6;">
                <div class="d-flex flex-column h-100">
                    <navbar [itens_mid]="navbar_itens_mid"></navbar>
                    <div class="flex-grow-1 p-3 overflow-hidden">
                        <div class="card h-100" style="border-radius: var(--border-radius-lg); overflow: hidden;">
                            <app-laser-nest></app-laser-nest>
                        </div>
                    </div>
                </div>
            </p-splitter-panel>
        </ng-template>
    </p-splitter>

    <!-- Componente da câmera integrado ao layout -->
    <div class="camera-container position-fixed bottom-0 end-0 m-3" style="z-index: 1000;">
        <app-pop-up-stream-player></app-pop-up-stream-player>
    </div>
</div>
